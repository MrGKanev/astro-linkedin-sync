name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level=high --prod

      - run: pnpm test

      - run: pnpm run build
